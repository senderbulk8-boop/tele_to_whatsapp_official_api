name: Telegram to WhatsApp Group Bridge

on:
  schedule:
    - cron: '*/5 * * * *'   # हर 5 मिनट में
  workflow_dispatch:        # Manual trigger

jobs:
  forward-messages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # Important for push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Telegram → WhatsApp Forwarder
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_GROUP_ID: ${{ secrets.WHATSAPP_GROUP_ID }}
        run: python bot.py

      - name: Commit and Push Updated bot.py (Auto Offset Save)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet bot.py; then
            echo "No changes in bot.py"
          else
            git add bot.py
            git commit -m "🤖 Auto-update LAST_OFFSET [skip ci]"
            git push
            echo "✅ bot.py updated with new offset"
          fi
